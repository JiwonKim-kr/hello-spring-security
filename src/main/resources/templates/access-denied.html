<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>접근 거부 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .denied-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .denied-code { font-size: 4rem; font-weight: 800; color: #e94560; line-height: 1; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card denied-card p-5 text-center">
                <div class="denied-code">403</div>
                <h4 class="fw-bold mt-3 mb-2">접근 권한이 없습니다</h4>
                <p class="text-muted mb-4">이 기능은 관리자(ROLE_ADMIN) 전용입니다.</p>
                <div class="d-flex gap-2 justify-content-center">
                    <a th:href="@{/products}" class="btn btn-outline-secondary">상품 목록</a>
                    <a th:href="@{/home}" class="btn btn-primary">홈으로</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
